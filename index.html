<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat With Rike</title>
    <style>
        /* Reset margins and structure layout vertically */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            background-color: #212121; /* Dark aesthetic background */
        }

        /* 🏷️ Top Header Bar (Takes up roughly 5% height) */
        .top-header {
            width: 100% !important;
            height: 50px !important;
            background-color: #171717; /* Slate dark accent */
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100 !important;
        }

        .top-header h1 {
            color: #ececf1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .author-name {
            color: #ab68ff; /* Vibrant premium accent for your name */
            font-weight: 700;
        }

        /* 🤖 Chat Workspace Container (Takes up 95% height) */
        .chat-workspace {
            flex: 1 !important;
            width: 100% !important;
            background-color: #ffffff;
        }

        /* Forces Zapier embed element to scale precisely into the container grid */
        zapier-interfaces-chatbot-embed {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <!-- Top Branding Title Bar Header -->
    <header class="top-header">
        <h1>Chat With Rike. <span class="author-name">By Ayyan Irfan</span></h1>
    </header>

    <!-- Lower Chat Module Execution Frame Area -->
    <main class="chat-workspace">
        <script async type="module" src="https://zapier.com"></script>
        <zapier-interfaces-chatbot-embed is-popup="false" chatbot-id="cmr1rgc4v002ah04bbj3ur1sw" height="100%" width="100%"></zapier-interfaces-chatbot-embed>
    </main>

</body>
</html>
