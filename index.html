<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat With Rike</title>
    <style>
        /* Force body layer foundations */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #212121; 
        }

        /* 🏷️ Top Header Bar Layout Setup */
        .top-header {
            width: 100% !important;
            height: 50px !important;
            background-color: #171717; 
            display: flex !important;
            align-items: center !important;
            padding: 0 20px !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100 !important;
            position: relative !important;
        }

        /* 🖼️ Left Corner Branding Image Layout */
        .header-logo {
            width: 32px !important;
            height: 32px !important;
            border-radius: 8px !important;
            object-fit: cover !important;
            margin-right: 15px !important; 
        }

        .top-header h1 {
            color: #ececf1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .author-name {
            color: #ab68ff; 
            font-weight: 700;
        }

        /* 🤖 Absolute Frame Blueprint: Forces chatbot to take remaining screen space */
        .chat-workspace {
            position: absolute !important;
            top: 50px !important; /* Starts exactly where header ends */
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            background-color: #ffffff !important;
            z-index: 50 !important;
        }

        /* Forces embedded elements to render inside boundaries */
        zapier-interfaces-chatbot-embed {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <!-- Top Branding Title Bar Header -->
    <header class="top-header">
        <img src="Logo.png" alt="Rike Logo" class="header-logo">
        <h1>Chat With Rike. <span class="author-name">By Ayyan Irfan</span></h1>
    </header>

    <!-- Lower Chat Module Execution Frame Area -->
    <main class="chat-workspace">
        <script async type="module" src="https://zapier.com"></script>
        <zapier-interfaces-chatbot-embed is-popup="false" chatbot-id="cmr1rgc4v002ah04bbj3ur1sw"></zapier-interfaces-chatbot-embed>
    </main>

</body>
</html>
